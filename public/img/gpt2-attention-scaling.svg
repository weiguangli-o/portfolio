<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
    <marker id="arr-r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ef4444"/></marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22c55e"/></marker>
  </defs>
  <rect width="900" height="420" rx="12" fill="#0f172a"/>
  <text x="450" y="35" text-anchor="middle" fill="#f1f5f9" font-size="17" font-weight="700">GPT-2 Attention Scaling — Bug &amp; Fix (transformers #44397)</text>

  <!-- BROKEN -->
  <text x="30" y="70" fill="#ef4444" font-size="13" font-weight="600">BROKEN: SDPA / FlashAttention path (scaling silently ignored)</text>
  <rect x="30" y="85" width="140" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="100" y="106" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">GPT2Attention</text>
  <text x="100" y="122" text-anchor="middle" fill="#94a3b8" font-size="10">forward()</text>

  <rect x="220" y="85" width="180" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="310" y="106" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">attention_interface()</text>
  <text x="310" y="122" text-anchor="middle" fill="#94a3b8" font-size="10">SDPA / FlashAttention</text>

  <rect x="450" y="85" width="160" height="50" rx="8" fill="#451a1a" stroke="#ef4444" stroke-width="2"/>
  <text x="530" y="106" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">scaling = None</text>
  <text x="530" y="122" text-anchor="middle" fill="#fca5a5" font-size="10">default 1/√d used</text>

  <rect x="660" y="85" width="210" height="50" rx="8" fill="#451a1a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="765" y="106" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">scale_attn_weights IGNORED</text>
  <text x="765" y="122" text-anchor="middle" fill="#fca5a5" font-size="11">scale_attn_by_inverse_layer IGNORED</text>

  <line x1="170" y1="110" x2="215" y2="110" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="400" y1="110" x2="445" y2="110" stroke="#ef4444" stroke-width="2" marker-end="url(#arr-r)" stroke-dasharray="6,3"/>
  <line x1="610" y1="110" x2="655" y2="110" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <!-- Eager OK -->
  <text x="30" y="175" fill="#94a3b8" font-size="13" font-weight="600">OK: Eager attention path (scaling applied manually)</text>
  <rect x="30" y="190" width="140" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="100" y="211" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">GPT2Attention</text>
  <text x="100" y="227" text-anchor="middle" fill="#94a3b8" font-size="10">forward()</text>

  <rect x="220" y="190" width="180" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="310" y="211" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">eager_attention_forward</text>
  <text x="310" y="227" text-anchor="middle" fill="#94a3b8" font-size="10">manual scaling inside</text>

  <rect x="450" y="190" width="160" height="50" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="530" y="211" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">Q·K^T * scaling</text>
  <text x="530" y="227" text-anchor="middle" fill="#86efac" font-size="10">correct output ✓</text>

  <line x1="170" y1="215" x2="215" y2="215" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="400" y1="215" x2="445" y2="215" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- FIXED -->
  <text x="30" y="290" fill="#22c55e" font-size="13" font-weight="600">FIXED: All backends receive scaling parameter</text>
  <rect x="30" y="305" width="140" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="100" y="322" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">__init__</text>
  <text x="100" y="340" text-anchor="middle" fill="#86efac" font-size="10">precompute self.scaling</text>

  <rect x="220" y="305" width="140" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="290" y="322" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">forward()</text>
  <text x="290" y="340" text-anchor="middle" fill="#86efac" font-size="10">pass scaling=</text>

  <rect x="410" y="305" width="170" height="50" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="495" y="322" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">attention_interface()</text>
  <text x="495" y="340" text-anchor="middle" fill="#86efac" font-size="10">scaling=self.scaling</text>

  <rect x="630" y="305" width="240" height="50" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="750" y="322" text-anchor="middle" fill="#d1fae5" font-size="11">Eager / SDPA / FlashAttention</text>
  <text x="750" y="340" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">all use correct scaling ✓</text>

  <line x1="170" y1="330" x2="215" y2="330" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="360" y1="330" x2="405" y2="330" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="580" y1="330" x2="625" y2="330" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Legend -->
  <rect x="30" y="380" width="840" height="30" rx="6" fill="#1e293b"/>
  <text x="50" y="400" fill="#94a3b8" font-size="11">Key insight: eager path applied scaling internally via module attribute checks, but SDPA/FA relied on the scaling parameter — which was never passed.</text>
</svg>